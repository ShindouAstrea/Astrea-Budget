# Análisis estático para Astrea Budget.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Archivos generados por build_runner (freezed / json / riverpod).
    - "**/*.freezed.dart"
    - "**/*.g.dart"
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    prefer_single_quotes: true
    require_trailing_commas: true
    avoid_print: true
