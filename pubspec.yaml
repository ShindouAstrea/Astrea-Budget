name: astrea_budget
description: "Astrea Budget — control visual de ingresos y gastos mes a mes (CLP / es_CL)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado y arquitectura
  flutter_riverpod: ^2.6.1

  # Navegación
  go_router: ^14.6.2

  # Backend (Supabase: Postgres + Auth + RLS)
  supabase_flutter: ^2.8.0

  # Modelos inmutables
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Gráficos
  fl_chart: ^0.69.2

  # Seguridad local
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Formato y localización
  intl: ^0.20.2

  # Tipografía (IBM Plex Sans)
  google_fonts: ^6.2.1

  # Variables de entorno desde archivo .env (sin --dart-define)
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generación de código
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  # NOTA: riverpod_generator 2.x arrastra analyzer_plugin 0.12.0, incompatible
  # con el analyzer 7.6 del SDK actual. Por eso los providers de Riverpod se
  # escriben a mano (idénticos en funcionalidad) y se mantiene codegen sólo
  # para freezed/json_serializable, que usan source_gen sin ese conflicto.

flutter:
  uses-material-design: true
  assets:
    # Archivo de variables de entorno cargado en runtime por flutter_dotenv.
    - .env
